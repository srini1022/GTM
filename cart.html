<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NMVJV29L"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
    <header>
        <div class="container">
            <h1 class="logo">DummyShop</h1>
            <nav>
                <ul>
                    <li><a href="index.html" id="nav-home" data-event-category="navigation" data-event-action="click" data-event-label="nav-home">Home</a></li>
                    <li><a href="products.html" id="nav-products" data-event-category="navigation" data-event-action="click" data-event-label="nav-products">Products</a></li>
                    <li><a href="cart.html" id="nav-cart" data-event-category="navigation" data-event-action="click" data-event-label="nav-cart">Cart (<span id="cart-count">0</span>)</a></li>
                    <li><a href="contact.html" id="nav-contact" data-event-category="navigation" data-event-action="click" data-event-label="nav-contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="cart-page">
            <div class="container">
                <h2>Your Cart</h2>
                <div id="cart-items">
                    <!-- Cart items will be populated by JS -->
                </div>
                <div id="cart-total">
                    <p>Total: $<span id="total-price">0.00</span></p>
                </div>
                <button class="btn" id="continue-shopping-btn" data-event-category="navigation" data-event-action="click" data-event-label="continue-shopping">Continue Shopping</button>
                <button class="btn" id="clear-cart-btn" data-event-category="cart" data-event-action="clear" data-event-label="clear-cart">Clear Cart</button>
                <button class="btn" id="checkout-btn" data-event-category="purchase" data-event-action="click" data-event-label="checkout">Proceed to Checkout</button>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="newsletter">
                <h3>Subscribe to Newsletter</h3>
                <form id="newsletter-form">
                    <input type="email" placeholder="Enter your email" required>
                    <button type="submit" class="btn" id="newsletter-submit" data-event-category="form" data-event-action="submit" data-event-label="newsletter">Subscribe</button>
                </form>
            </div>
            <div class="footer-links">
                <a href="contact.html" id="footer-contact-link" data-event-category="navigation" data-event-action="click" data-event-label="footer-contact">Contact Us</a>
                <a href="products.html" id="footer-products-link" data-event-category="navigation" data-event-action="click" data-event-label="footer-products">Products</a>
            </div>
            <div class="social-links">
                <a href="#" id="facebook-link" data-event-category="social" data-event-action="click" data-event-label="facebook">Facebook</a>
                <a href="#" id="twitter-link" data-event-category="social" data-event-action="click" data-event-label="twitter">Twitter</a>
                <a href="#" id="instagram-link" data-event-category="social" data-event-action="click" data-event-label="instagram">Instagram</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
