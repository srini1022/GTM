<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dummy E-Commerce - Product Detail</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-83NFRBF5CX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-83NFRBF5CX');
</script>
</head>
<body>
    <header>
        <div class="container">
            <h1 class="logo">DummyShop</h1>
            <nav>
                <ul>
                    <li><a href="index.html" id="nav-home" data-event-category="navigation" data-event-action="click" data-event-label="nav-home">Home</a></li>
                    <li><a href="products.html" id="nav-products" data-event-category="navigation" data-event-action="click" data-event-label="nav-products">Products</a></li>
                    <li><a href="cart.html" id="nav-cart" data-event-category="navigation" data-event-action="click" data-event-label="nav-cart">Cart (<span id="cart-count">0</span>)</a></li>
                    <li><a href="contact.html" id="nav-contact" data-event-category="navigation" data-event-action="click" data-event-label="nav-contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="product-detail">
            <div class="container">
                <div class="product-detail-content">
                    <img src="assets/images/1.jpg" alt="Dummy Product 1" class="product-image" id="product-detail-image" data-event-category="product" data-event-action="click" data-event-label="product-detail-image">
                    <div class="product-info">
                        <h2>Dummy Product 1</h2>
                        <p class="price">$19.99</p>
                        <p class="description">This is a detailed description of Dummy Product 1. It's a great product for testing purposes.</p>
                        <div class="image-gallery">
                            <h3>Product Images</h3>
                            <div class="gallery-images">
                                <img src="assets/images/1.jpg" alt="Image 1" id="gallery-image-1" data-event-category="gallery" data-event-action="click" data-event-label="gallery-image-1">
                                <img src="assets/images/2.jpg" alt="Image 2" id="gallery-image-2" data-event-category="gallery" data-event-action="click" data-event-label="gallery-image-2">
                                <img src="assets/images/1.jpg" alt="Image 3" id="gallery-image-3" data-event-category="gallery" data-event-action="click" data-event-label="gallery-image-3">
                            </div>
                        </div>
                        <button class="btn add-to-cart-btn" id="add-to-cart-detail" data-product-id="1" data-product-name="Dummy Product 1" data-product-price="19.99" data-event-category="cart" data-event-action="add" data-event-label="add-to-cart-detail">Add to Cart</button>
                        <button class="btn" id="buy-now-btn" data-product-id="1" data-product-name="Dummy Product 1" data-product-price="19.99" data-event-category="purchase" data-event-action="click" data-event-label="buy-now">Buy Now</button>
                        <button class="btn" id="add-to-wishlist-btn" data-product-id="1" data-event-category="wishlist" data-event-action="add" data-event-label="add-to-wishlist">Add to Wishlist</button>
                        <button class="btn" id="share-btn" data-event-category="social" data-event-action="share" data-event-label="share">Share</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="newsletter">
                <h3>Subscribe to Newsletter</h3>
                <form id="newsletter-form">
                    <input type="email" placeholder="Enter your email" required>
                    <button type="submit" class="btn" id="newsletter-submit" data-event-category="form" data-event-action="submit" data-event-label="newsletter">Subscribe</button>
                </form>
            </div>
            <div class="footer-links">
                <a href="contact.html" id="footer-contact-link" data-event-category="navigation" data-event-action="click" data-event-label="footer-contact">Contact Us</a>
                <a href="products.html" id="footer-products-link" data-event-category="navigation" data-event-action="click" data-event-label="footer-products">Products</a>
            </div>
            <div class="social-links">
                <a href="#" id="facebook-link" data-event-category="social" data-event-action="click" data-event-label="facebook">Facebook</a>
                <a href="#" id="twitter-link" data-event-category="social" data-event-action="click" data-event-label="twitter">Twitter</a>
                <a href="#" id="instagram-link" data-event-category="social" data-event-action="click" data-event-label="instagram">Instagram</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
