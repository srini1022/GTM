<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dummy E-Commerce - Contact</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-83NFRBF5CX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-83NFRBF5CX');
</script>
</head>
<body>
    <header>
        <div class="container">
            <h1 class="logo">DummyShop</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="cart.html">Cart (<span id="cart-count">0</span>)</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="contact-page">
            <div class="container">
                <h2>Contact Us</h2>
                <div id="form-messages"></div>
                <form id="contact-form">
                    <div class="form-group">
                        <label for="full-name">Full Name:</label>
                        <input type="text" id="full-name" name="fullName" data-field="name" required>
                        <div class="error-message" id="name-error"></div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" data-field="email" required>
                        <div class="error-message" id="email-error"></div>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number:</label>
                        <input type="tel" id="phone" name="phone" data-field="phone" required>
                        <div class="error-message" id="phone-error"></div>
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject:</label>
                        <select id="subject" name="subject" data-field="subject" required>
                            <option value="">Select Subject</option>
                            <option value="general">General Inquiry</option>
                            <option value="support">Support</option>
                            <option value="feedback">Feedback</option>
                            <option value="sales">Sales</option>
                        </select>
                        <div class="error-message" id="subject-error"></div>
                    </div>
                    <div class="form-group">
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" data-field="message" required></textarea>
                        <div class="error-message" id="message-error"></div>
                    </div>
                    <div class="form-group">
                        <label for="country">Country:</label>
                        <select id="country" name="country" data-field="country">
                            <option value="">Select Country</option>
                            <option value="usa">United States</option>
                            <option value="canada">Canada</option>
                            <option value="uk">United Kingdom</option>
                            <option value="australia">Australia</option>
                            <option value="germany">Germany</option>
                        </select>
                        <div class="error-message" id="country-error"></div>
                    </div>
                    <div class="form-group">
                        <label>Gender:</label>
                        <div class="radio-group">
                            <input type="radio" id="male" name="gender" value="male" data-field="gender">
                            <label for="male">Male</label>
                            <input type="radio" id="female" name="gender" value="female" data-field="gender">
                            <label for="female">Female</label>
                            <input type="radio" id="other" name="gender" value="other" data-field="gender">
                            <label for="other">Other</label>
                        </div>
                        <div class="error-message" id="gender-error"></div>
                    </div>
                    <div class="form-group">
                        <input type="checkbox" id="terms" name="terms" data-field="terms" required>
                        <label for="terms">I agree to the Terms & Conditions</label>
                        <div class="error-message" id="terms-error"></div>
                    </div>
                    <button type="submit" class="btn" id="submit-btn" data-event-category="form" data-event-action="submit" data-event-label="contact">Send Message</button>
                </form>
                <div class="social-links">
                    <h3>Follow Us</h3>
                    <a href="#" id="facebook-link" data-event-category="social" data-event-action="click" data-event-label="facebook">Facebook</a>
                    <a href="#" id="twitter-link" data-event-category="social" data-event-action="click" data-event-label="twitter">Twitter</a>
                    <a href="#" id="instagram-link" data-event-category="social" data-event-action="click" data-event-label="instagram">Instagram</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="newsletter">
                <h3>Subscribe to Newsletter</h3>
                <form id="newsletter-form">
                    <input type="email" placeholder="Enter your email" required>
                    <button type="submit" class="btn" id="newsletter-submit" data-event-category="form" data-event-action="submit" data-event-label="newsletter">Subscribe</button>
                </form>
            </div>
            <div class="footer-links">
                <a href="contact.html" id="footer-contact-link" data-event-category="navigation" data-event-action="click" data-event-label="footer-contact">Contact Us</a>
                <a href="products.html" id="footer-products-link" data-event-category="navigation" data-event-action="click" data-event-label="footer-products">Products</a>
            </div>
            <div class="social-links">
                <a href="#" id="facebook-link" data-event-category="social" data-event-action="click" data-event-label="facebook">Facebook</a>
                <a href="#" id="twitter-link" data-event-category="social" data-event-action="click" data-event-label="twitter">Twitter</a>
                <a href="#" id="instagram-link" data-event-category="social" data-event-action="click" data-event-label="instagram">Instagram</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
